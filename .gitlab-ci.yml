stages:
  - build_and_test
  - analyze
  - deploy

variables:
  BUILD_NAME: TransportTycoon
  UNITY_ACTIVATION_FILE: ./unity3d.alf
  UNITY_VERSION: "6000.3.7f1"
  IMAGE: unityci/editor # https://hub.docker.com/r/unityci/editor
  IMAGE_VERSION: "3" # This will automatically use latest v3.x.x, see https://github.com/game-ci/docker/releases
  UNITY_DIR: $CI_PROJECT_DIR # this needs to be an absolute path. Defaults to the root of your tree.
  VERSION_NUMBER_VAR: $CI_COMMIT_REF_SLUG-$CI_PIPELINE_ID-$CI_JOB_ID
  VERSION_BUILD_VAR: $CI_PIPELINE_IID

image: $IMAGE:$UNITY_VERSION-base-$IMAGE_VERSION

default:
  tags: [ unity ] # set default tags for jobs

.unity_before_script: &unity_before_script
  before_script:
    - chmod +x ./ci/before_script.sh && ./ci/before_script.sh

.cache: &cache
  cache:
    key: "$CI_PROJECT_NAMESPACE-$CI_PROJECT_NAME-$CI_COMMIT_REF_SLUG-$TEST_PLATFORM"
    paths:
      - $UNITY_DIR/Library/

.license: &license
  rules:
    - if: '$UNITY_LICENSE != null'
      when: always

get-activation-file:
  image: $IMAGE:2021.3.4f1-base-1.0.1
  rules:
    - if: '$UNITY_LICENSE == null'
      when: manual
  stage: build_and_test
  script:
    - chmod +x ./ci/get_activation_file.sh && ./ci/get_activation_file.sh
  artifacts:
    paths:
      - $UNITY_ACTIVATION_FILE
    expire_in: 10 min

.test: &test
  stage: build_and_test
  <<: *unity_before_script
  <<: *cache
  <<: *license
  script:
    - chmod +x ./ci/test.sh && ./ci/test.sh
    - chmod +x ./ci/nunit2junit.sh && ./ci/nunit2junit.sh
  artifacts:
    when: always
    expire_in: 2 weeks
    paths:
      - $UNITY_DIR/TransportTycoon/Assets/playmode-results.xml
      - $UNITY_DIR/TransportTycoon/Assets/playmode-junit-report.xml
      - $UNITY_DIR/TransportTycoon/Assets/playmode-coverage/
    reports:
      junit: $UNITY_DIR/TransportTycoon/Assets/playmode-junit-report.xml
      coverage_report:
        coverage_format: cobertura
        path: $UNITY_DIR/TransportTycoon/Assets/playmode-coverage/TestCoverageResults_*.xml
  coverage: /<Linecoverage>(.*?)<\/Linecoverage>/

test-playmode:
  <<: *test
  variables:
    TEST_PLATFORM: playmode
    TESTING_TYPE: NUNIT

test-editmode:
  <<: *test
  variables:
    TEST_PLATFORM: editmode
    TESTING_TYPE: NUNIT

.build: &build
  stage: build_and_test
  <<: *unity_before_script
  <<: *cache
  <<: *license
  script:
    - chmod +x ./ci/build.sh && ./ci/build.sh
  artifacts:
    paths:
      - $UNITY_DIR/TransportTycoon/Assets/Builds/

build-StandaloneLinux64:
  <<: *build
  variables:
    BUILD_TARGET: StandaloneLinux64

build-StandaloneOSX:
  <<: *build
  image: $IMAGE:$UNITY_VERSION-mac-mono-$IMAGE_VERSION
  variables:
    BUILD_TARGET: StandaloneOSX

build-StandaloneWindows64:
  <<: *build
  image: $IMAGE:$UNITY_VERSION-windows-mono-$IMAGE_VERSION
  variables:
    BUILD_TARGET: StandaloneWindows64

build-WebGL:
  <<: *build
  image: $IMAGE:$UNITY_VERSION-webgl-$IMAGE_VERSION
  variables:
    BUILD_TARGET: WebGL
  rules:
    - if: '$UNITY_LICENSE && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: always
    - when: never
    
pages:
  image: alpine:latest
  stage: deploy
  tags: [] # this is not a Unity based job
  dependencies:
    - build-WebGL
    - test-playmode
  script:
    - mkdir public
    - mv "$UNITY_DIR/TransportTycoon/Assets/Builds/WebGL/${BUILD_NAME}" public/demo
    - mv "$UNITY_DIR/TransportTycoon/Assets/playmode-coverage/Report/" public/coverage
  artifacts:
    paths:
      - public
  rules:
    - if: '$UNITY_LICENSE && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: always
    - when: never

analyze:
  <<: *unity_before_script
  <<: *license
  stage: analyze
  variables:
    ANALYZERS_DIR: /analyzers
  script:
    - chmod +x ./ci/generate_project_files.sh && ./ci/generate_project_files.sh
    - |
      cd /      
      export PATH="$PATH:$HOME/.dotnet/tools"
      dotnet tool install --global Roslynator.DotNet.Cli --version 0.10.2
      dotnet tool install --global CodeQualityToGitlab --version 2.0.0
      nuget install Microsoft.Unity.Analyzers -Version 1.26.0 -OutputDirectory $ANALYZERS_DIR
      cd $CI_PROJECT_DIR
    - |
      SLN_FILE=$(find "$CI_PROJECT_DIR" -maxdepth 1 -name "*.sln" | head -n 1)
      if [ -z "$SLN_FILE" ]; then
        echo "ERROR: No .sln file found in $CI_PROJECT_DIR"
        exit 1
      fi
    - 'roslynator analyze "$SLN_FILE" -o ./roslynator.xml --analyzer-assemblies $ANALYZERS_DIR || true'
    - cq roslynator roslynator.xml gl-code-quality-report.json $CI_PROJECT_DIR
  artifacts:
    expire_in: 2 weeks
    paths:
      - roslynator.xml
      - gl-code-quality-report.json
    expose_as: 'code_quality_report'
    reports:
      codequality: gl-code-quality-report.json

workflow:
  rules:
    - if: $CI_MERGE_REQUEST_ID
      when: never
    - if: $CI_COMMIT_TAG
      when: never
    - when: always